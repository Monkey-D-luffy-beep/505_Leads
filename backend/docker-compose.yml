version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    restart: unless-stopped

  worker:
    build: .
    env_file:
      - .env
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    restart: unless-stopped
