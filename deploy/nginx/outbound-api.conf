# Nginx reverse proxy config for Outbound Tool API
# Copy this to /etc/nginx/sites-available/outbound-api
# Then: sudo ln -s /etc/nginx/sites-available/outbound-api /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# Then: sudo certbot --nginx -d api.yourdomain.com

server {
    listen 80;
    server_name api.yourdomain.com;  # <-- CHANGE THIS to your actual API domain

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for any file uploads)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Webhook endpoint — longer timeout for Brevo callbacks
    location /api/v1/webhooks/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
