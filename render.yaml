services:
  - type: web
    name: 505-leads-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SMTP_HOST
        value: smtp-relay.brevo.com
      - key: BREVO_SMTP_PORT
        value: "587"
      - key: BREVO_SENDER_NAME
        value: 505 Leads
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://outbound-tool-nu.vercel.app
